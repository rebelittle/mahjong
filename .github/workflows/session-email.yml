name: Session roster email

on:
  schedule:
    # Hourly. The script looks for sessions starting 4–7 hours out and the
    # session_email_log table dedupes, so delayed/skipped runs are harmless.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode: email the next upcoming session's roster now, without logging it as sent"
        type: boolean
        default: true
      recipient:
        description: "Recipient override (defaults to mlittle@foxhill-school.com)"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Send roster emails
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.test_mode && 'true' || 'false' }}
          RECIPIENT: ${{ inputs.recipient }}
        run: node scripts/send-roster-email.mjs
